<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h2>Parameters</h2>

        <!-- Systems -->
        <div class="control">
            <label>System Type</label>
            <label><input type="checkbox" value="A" checked> A</label>
            <label><input type="checkbox" value="B"> B</label>
            <label><input type="checkbox" value="C"> C</label>
        </div>

        <!-- CPU -->
       <div class="control">
            <label for="cpu-select">CPU Model</label>
            <select id="cpu-select"></select>
        </div>

        <!-- Number of cores -->
        <div class="control">
            <label for="cores">Number of cores</label>
            <input type="number" id="cores" min="1" value="1">
        </div>

        <!-- Time -->
        <div class="control">
            <label for="time">Time (s)</label>
            <input type="range" id="time" min="0" max="60" value="30">
            <span id="timeValue">30</span>
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <div id="plot"></div>
    </div>

</div>

<script>
// Populate GPU dropdown from CSV
async function loadCPUs() {
    const response = await fetch('../frugalityscore/src/data/CPUs.csv');
    const text = await response.text();
    const lines = text.split(/\r?\n/).slice(1);

    const select = document.getElementById("cpu-select");

    lines.forEach((line, index) => {
        if (!line.trim()) return;
        const cols = line.split(',');
        const model = cols[0];
        const TDP_per_core = parseFloat(cols[2]) || 1; // 3rd column

        const option = document.createElement("option");
        option.value = model;
        option.textContent = model;
        option.dataset.TDP_per_core = TDP_per_core;

        if (index === 0) option.selected = true;

        select.appendChild(option);
    });
}

function generateTrace(system, time, cpuFactor, cores) {
    let x = [];
    let y = [];

    for (let i = 0; i <= time; i++) {
        x.push(i);

        // Fake data logic depending on system + GPU
        let factor = 1;
        if (system === "A") factor = 1;
        if (system === "B") factor = 1.5;
        if (system === "C") factor = 2;

        factor *= cpuFactor * cores;

        y.push(Math.sin(i / 5) * factor + Math.random());
    }

    return {
        x: x,
        y: y,
        mode: 'lines',
        name: `System ${system}`
    };
}

function updatePlot() {
    const systems = getSelectedSystems();

    const select = document.getElementById("cpu-select");
    const selectedOption = select.options[select.selectedIndex];
    if (!selectedOption) return;

    const cpu = selectedOption.textContent;
    const cpuFactor = parseFloat(selectedOption.dataset.TDP_per_core);
    const cores = parseInt(document.getElementById("cores").value) || 1;
    const time = parseInt(document.getElementById("time").value);

    let traces = systems.map(sys => generateTrace(sys, time, cpuFactor, cores));

    const layout = {
        title: `Performance over Time (${cpu})`,
        xaxis: { title: "Time (s)" },
        yaxis: { title: "Value" }
    };

    Plotly.newPlot('plot', traces, layout);
}

function getSelectedSystems() {
    const checkboxes = document.querySelectorAll('.left-panel input[type="checkbox"]:checked');
    return Array.from(checkboxes).map(cb => cb.value);
}

// Update slider label
document.getElementById("time").addEventListener("input", function() {
    document.getElementById("timeValue").textContent = this.value;
    updatePlot();
});

// Update on interactions
document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", updatePlot);
});

document.getElementById("cpu-select").addEventListener("change", updatePlot);
document.getElementById("cores").addEventListener("input", updatePlot);

// Initial plot
loadCPUs().then(() => updatePlot());
</script>

</body>
</html>
