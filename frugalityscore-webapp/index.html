<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h2>Parameters</h2>

        <!-- Systems -->
        <div class="control">
            <label>System Type</label>
            <label><input type="checkbox" value="A" checked> A</label>
            <label><input type="checkbox" value="B"> B</label>
            <label><input type="checkbox" value="C"> C</label>
        </div>

        <!-- CPU -->
        <div class="control" id="systems-container">
            <label>CPU Model</label>
            <!-- Checkboxes will be populated dynamically from CSV -->
        </div>

        <!-- Time -->
        <div class="control">
            <label for="time">Time (s)</label>
            <input type="range" id="time" min="0" max="60" value="30">
            <span id="timeValue">30</span>
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <div id="plot"></div>
    </div>

</div>

<script>
// Populate GPU dropdown from CSV
async function loadCPUs() {
    const response = await fetch('frugalityscore/src/data/CPUs.csv');
    const text = await response.text();
    const lines = text.split(/\r?\n/).slice(1); // skip header

    const container = document.getElementById("systems-container");

    lines.forEach((line, index) => {
        if (!line.trim()) return;
        const cols = line.split(',');
        const model = cols[0];

        const label = document.createElement("label");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = model;
        if (index === 0) checkbox.checked = true; // check first by default
        checkbox.addEventListener("change", updatePlot);

        label.appendChild(checkbox);
        label.appendChild(document.createTextNode(" " + model));
        container.appendChild(label);
    });
}

// Update getSelectedSystems to use dynamically created checkboxes
function getSelectedSystems() {
    const checkboxes = document.querySelectorAll('#systems-container input[type="checkbox"]:checked');
    return Array.from(checkboxes).map(cb => cb.value);
}

function generateTrace(system, time, systemscontainer) {
    let x = [];
    let y = [];

    for (let i = 0; i <= time; i++) {
        x.push(i);

        // Fake data logic depending on system + GPU
        let factor = 1;
        if (system === "A") factor = 1;
        if (system === "B") factor = 1.5;
        if (system === "C") factor = 2;

        if (systemscontainer === "GPU2") factor *= 1.2;
        if (systemscontainer === "GPU3") factor *= 1.5;

        y.push(Math.sin(i / 5) * factor + Math.random());
    }

    return {
        x: x,
        y: y,
        mode: 'lines',
        name: `System ${system}`
    };
}

function updatePlot() {
    const systems = getSelectedSystems();
    const systemscontainer = document.getElementById("systems-container").value;
    const time = parseInt(document.getElementById("time").value);

    let traces = systems.map(sys => generateTrace(sys, time, systemscontainer));

    const layout = {
        title: `Performance over Time (${systemscontainer})`,
        xaxis: { title: "Time (s)" },
        yaxis: { title: "Value" }
    };

    Plotly.newPlot('plot', traces, layout);
}

// Update slider label
document.getElementById("time").addEventListener("input", function() {
    document.getElementById("timeValue").textContent = this.value;
    updatePlot();
});

// Update on interactions
document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", updatePlot);
});

document.getElementById("systems-container").addEventListener("change", updatePlot);

// Initial plot
loadCPUs().then(() => updatePlot());
</script>

</body>
</html>
