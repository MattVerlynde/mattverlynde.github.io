<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h2>Parameters</h2>

        <!-- Systems -->
        <div class="control">
            <label>System Type</label>
            <label><input type="checkbox" value="A" checked> A</label>
            <label><input type="checkbox" value="B"> B</label>
            <label><input type="checkbox" value="C"> C</label>
        </div>

        <!-- Performance -->
        <div class="control">
            <label for="metric">Performance metric</label>
            <select id="metric"></select>
        </div>

        <!-- CPU -->
       <div class="control">
            <label for="cpu-select">CPU Model</label>
            <select id="cpu-select"></select>
        </div>

        <!-- Number of cores -->
        <div class="control">
            <label for="cores">Number of cores</label>
            <input type="number" id="cores" min="1" value="1">
        </div>

        <!-- Time -->
        <div class="control">
            <label for="time">Time (s)</label>
            <input type="range" id="time" min="0" max="60" value="30">
            <span id="timeValue">30</span>
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <div id="plot"></div>
    </div>

</div>

<script>
let performanceData = {};

async function loadPerformanceData() {
    const response = await fetch('../frugalityscore/src/data/referencePerformance.json');
    performanceData = await response.json();

    const metricSelect = document.getElementById("metric");

    Object.keys(performanceData.performance_minmax).forEach((metric, index) => {
        const option = document.createElement("option");
        option.value = metric;
        option.textContent = metric;

        if (index === 0) option.selected = true;

        metricSelect.appendChild(option);
    });
}

// Populate CPU dropdown from CSV
async function loadCPUs() {
    const response = await fetch('../frugalityscore/src/data/CPUs.csv');
    const text = await response.text();
    const lines = text.split(/\r?\n/).slice(1);

    const select = document.getElementById("cpu-select");

    lines.forEach((line, index) => {
        if (!line.trim()) return;
        const cols = line.split(',');
        const model = cols[0];
        const TDP_per_core = parseFloat(cols[2]) || 1; // 3rd column

        const option = document.createElement("option");
        option.value = model;
        option.textContent = model;
        option.dataset.TDP_per_core = TDP_per_core;

        if (index === 0) option.selected = true;

        select.appendChild(option);
    });
}

function trimf(x, [a, b, c]) {
    if (a === b && x === a) return 1;
    if (b === c && x === c) return 1;

    if (x <= a || x >= c) return 0;
    if (x === b) return 1;

    if (x < b) return (b === a) ? 1 : (x - a) / (b - a);
    return (c === b) ? 1 : (c - x) / (c - b);
}

function trapmf(x, [a, b, c, d]) {
    if (b === a && x === a) return 1;
    if (c === d && x === d) return 1;

    if (x <= a || x >= d) return 0;
    if (x >= b && x <= c) return 1;

    if (x > a && x < b) return (b === a) ? 1 : (x - a) / (b - a);
    return (d === c) ? 1 : (d - x) / (d - c);
}

function computeMembership(metric, x) {
    const funcs = performanceData.performance_functions[metric];
    const params = performanceData.performance_params[metric];

    let results = [];

    for (let i = 0; i < funcs.length; i++) {
        if (funcs[i] === "trimf") {
            results.push(trimf(x, params[i]));
        } else if (funcs[i] === "trapmf") {
            results.push(trapmf(x, params[i]));
        }
    }

    return results;
}

function generateTrace(system, time, cpuFactor, cores, minVal, maxVal, metric) {
    let x = [];
    let y = [];

    for (let i = 0; i <= time; i++) {
        x.push(i);

        // Fake data logic depending on system + GPU
        let factor = 1;
        if (system === "A") factor = 1;
        if (system === "B") factor = 1.5;
        if (system === "C") factor = 2;

        factor *= cpuFactor * cores;

        let raw = Math.sin(i / 5) * factor + Math.random();

        // normalize to metric range
        let normalized = (raw + 1) / 2;
        let scaled = minVal + normalized * (maxVal - minVal);

        // compute fuzzy memberships
        let memberships = computeMembership(metric, scaled);

        // example: take max membership
        let score = Math.max(...memberships);

        y.push(score);
    }

    return {
        x: x,
        y: y,
        mode: 'lines',
        name: `System ${system}`
    };
}

function updatePlot() {
    const systems = getSelectedSystems();

    const metric = document.getElementById("metric").value;
    if (!performanceData.performance_minmax) return;
    const [minVal, maxVal] = performanceData.performance_minmax[metric];

    const select = document.getElementById("cpu-select");
    const selectedOption = select.options[select.selectedIndex];
    if (!selectedOption) return;

    const cpu = selectedOption.textContent;
    const cpuFactor = parseFloat(selectedOption.dataset.TDP_per_core);
    const cores = parseInt(document.getElementById("cores").value) || 1;
    const time = parseInt(document.getElementById("time").value);

    let traces = systems.map(sys => generateTrace(sys, time, cpuFactor, cores, minVal, maxVal, metric));

    const layout = {
        title: `Performance over Time (${cpu})`,
        xaxis: { title: "Time (s)" },
        yaxis: { title: "Value" }
    };

    Plotly.newPlot('plot', traces, layout);
}

function getSelectedSystems() {
    const checkboxes = document.querySelectorAll('.left-panel input[type="checkbox"]:checked');
    return Array.from(checkboxes).map(cb => cb.value);
}

// Update slider label
document.getElementById("time").addEventListener("input", function() {
    document.getElementById("timeValue").textContent = this.value;
    updatePlot();
});

// Update on interactions
document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", updatePlot);
});

document.getElementById("cpu-select").addEventListener("change", updatePlot);
document.getElementById("cores").addEventListener("input", updatePlot);
document.getElementById("metric").addEventListener("change", updatePlot);

// Initial plot
Promise.all([
    loadCPUs(),
    loadPerformanceData()
]).then(() => updatePlot());
</script>

</body>
</html>
