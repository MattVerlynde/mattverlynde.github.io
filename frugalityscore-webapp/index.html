<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<div class="container">
  <div class="left-panel">
    <h2>Parameters</h2>
    <div class="control">
            <form>
            <label>System Type</label>
            <label><input type="radio" name="systemType" value="Non ML" checked> Non ML</label>
            <label><input type="radio" name="systemType" value="ML"> ML</label>
            <label><input type="radio" name="systemType" value="DL"> DL</label>
            </form>
        </div>

        <!-- Performance -->
        <div class="control">
            <label for="metric">Performance metric</label>
            <select id="metric"></select>
        </div>

        <!-- CPU -->
       <div class="control-inline">
            <label for="cpu-select">CPU Model</label>
            <select id="cpu-select"></select><input type="number" id="cpu-power" min="0" value="6">W
        </div>

        <!-- Number of cores -->
        <div class="control">
            <label for="cores">Number of cores</label>
            <input type="number" id="cores" min="1" value="1">
        </div>

        <!-- GPU -->
       <div class="control-inline">
            <label for="gpu-select">GPU Model</label>
            <select id="gpu-select"></select><input type="number" id="gpu-power" min="0" value="6">W
        </div>

        <!-- Number of GPUs -->
        <div class="control">
            <label for="number-gpu">Number of GPUs</label>
            <input type="number" id="number-gpu" min="0" value="0">
        </div>

        <!-- Time -->
        <!-- <div class="control">
            <label for="time">Time (s)</label>
            <input type="range" id="time" min="0" max="60" value="30">
            <span id="timeValue">30</span>
        </div> -->

        <!-- Energy -->
        <label>Time limits (s)</label>
        <div class="control">
            <label>
            <input type="range" id="energy_low" min="0" max="100" value="10">
            </label><input type="number" id="energyValueLow" min="0" value="10">s (Low)
        </div>
        <div class="control">
            <label>
            <input type="range" id="energy_medium" min="0" max="100" value="50">
            </label><input type="number" id="energyValueMedium" min="0" value="50">s (Medium)
        </div>
        <div class="control">
            <label>
            <input type="range" id="energy_high" min="0" max="100" value="90">
            </label><input type="number" id="energyValueHigh" min="0" value="90">s (High)
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <div class="visual-section">
            <label>Membership Functions</label>
            <div id="plot_membership" class="plot"></div>
            <div id="plot_membership_energy" class="plot"></div>
        </div>

        <!-- <div class="output-displays"> -->
            <!-- Input values -->
            <div class="input-summary">
                <div><label>Performance
                <input type="number" id="perf" value="0" step="0.01"></label>
                </div>
                <div><label>Energy Consumption (J)
                <input type="number" id="energy" min="0" value="0" step="1"></label>
                </div>
                <div><label>Upload CSV
                <input type="file" id="input-file" accept=".csv" />
                </div>
            </div>
            <div class="output-summary">
                <div id="plot_membership_score" class="plot"></div>
                <div id="plot_membership_score_agg" class="plot"></div>
            </div>
            <div class="output-summary">
                <div id="score_display" class="score-display"></div>
                <div id="bar_scores_display" class="plot" style="display:none;"></div>
                <div id="defuzz_display" class="radio-group">
                    <label>Defuzzification Type</label>
                    <label><input type="radio" name="defuzz" value="centroid" checked> Centroid</label>
                    <label><input type="radio" name="defuzz" value="bisector"> Bisector</label>
                    <label><input type="radio" name="defuzz" value="som"> SOM</label>
                    <label><input type="radio" name="defuzz" value="mom"> MOM</label>
                    <label><input type="radio" name="defuzz" value="lom"> LOM</label>
                </div>
            </div>
        <!-- </div> -->
    </div>
</div>

<script type="text/javascript" src="frugalityscore.js"></script>

</body>
</html>
